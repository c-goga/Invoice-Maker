<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <link href="../node_modules/bootstrap/dist/css/bootstrap.css" rel="stylesheet">
    <link href="./styles.css" rel="stylesheet">
    <title>Invoice Maker</title>
  </head>
  <body>
    <header>
      <h1 id="title" class="text-center"></h1>
    </header>

    <main class="d-flex flex-row justify-content-center">

      <div id="edit-current" class="w-75 p-2">
        <form id="create-company-form"  class="fw-bold d-flex flex-column align-items-center">
          <div class="text-center">Full Name:</div>
            <input id="full-name" type="text" class="w-100" maxlength="100" required>

            <div class="text-center">Company Name:</div>
            <input id="company-name" type="text" class="w-100" maxlength="100" required>

            <div class="text-center">Address:</div>
            <input id="company-address" type="text" class="w-100" maxlength="100" required>

            <div class="container row g-0 w-100">
              <div class="col col-lg-10 col-med-8 col-sm-8 text-center d-flex flex-column pe-2">
                City:
                <input id="company-city" type="text" class="w-100 file" maxlength="25" required>
              </div>
              
              <div class="col col-lg-2 col-med-4 col-sm-4 ps-4 d-flex flex-column">
                <label for="state-initials">State:</label>
                <select id="state-initials" class="w-75 file" name="state-initials" required>
                  <option value="AL">AL</option>
                  <option value="AK">AK</option>
                  <option value="AZ">AZ</option>
                  <option value="AR">AR</option>
                  <option value="AS">AS</option>
                  <option value="CA">CA</option>
                  <option value="CO">CO</option>
                  <option value="CT">CT</option>
                  <option value="DE">DE</option>
                  <option value="DC">DC</option>
                  <option value="FL">FL</option>
                  <option value="GA">GA</option>
                  <option value="GU">GU</option>
                  <option value="HI">HI</option>
                  <option value="ID">ID</option>
                  <option value="IL">IL</option>
                  <option value="IN">IN</option>
                  <option value="IA">IA</option>
                  <option value="KS">KS</option>
                  <option value="KY">KY</option>
                  <option value="LA">LA</option>
                  <option value="ME">ME</option>
                  <option value="MD">MD</option>
                  <option value="MA">MA</option>
                  <option value="MI">MI</option>
                  <option value="MN">MN</option>
                  <option value="MS">MS</option>
                  <option value="MO">MO</option>
                  <option value="MT">MT</option>
                  <option value="NE">NE</option>
                  <option value="NV">NV</option>
                  <option value="NH">NH</option>
                  <option value="NJ">NJ</option>
                  <option value="NM">NM</option>
                  <option value="NY">NY</option>
                  <option value="NC">NC</option>
                  <option value="ND">ND</option>
                  <option value="MP">MP</option>
                  <option value="OH">OH</option>
                  <option value="OK">OK</option>
                  <option value="OR">OR</option>
                  <option value="PA">PA</option>
                  <option value="PR">PR</option>
                  <option value="RI">RI</option>
                  <option value="SC">SC</option>
                  <option value="SD">SD</option>
                  <option value="TN">TN</option>
                  <option value="TX">TX</option>
                  <option value="TT">TT</option>
                  <option value="UT">UT</option>
                  <option value="VT">VT</option>
                  <option value="VA">VA</option>
                  <option value="VI">VI</option>
                  <option value="WA">WA</option>
                  <option value="WV">WV</option>
                  <option value="WI">WI</option>
                  <option value="WY">WY</option>
                </select>
              </div>
            </div>

            <div class="text-center">Zip Code:</div>
            <input id="company-zip-code" type="text" class="w-100 int-dash" maxlength="10" required>

            <div class="text-center">Phone Number:</div>
            <input id="company-phone-number" type="text" class="w-100" minlength="14" maxlength="14" required>

            <div class="text-center">Email:</div>
            <input id="company-email" type="email" class="w-100" maxlength="50" required>

            <div id="save-cancel" class="d-flex flex-row w-100">
              <button id="create-initial-company-submit" type="submit" class="my-2 me-2 w-100">Save</button>
            </div>
        </form>
      </div> 

    </main>

    <!-- You can also require other files to run in this process -->
    <script src="./renderer.js"></script>

    <template id="company-template">
      <div class="company">

      </div>
    </template>
  </body>
</html>
